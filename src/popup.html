<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>calm-web</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: #f8f7f4;
      color: #2c2c2c;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #2c2c2c;
      letter-spacing: -0.01em;
    }
    .subtitle { font-size: 12px; color: #999; margin-bottom: 16px; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }
    .label { font-size: 13px; color: #2c2c2c; }
    .site-hostname {
      font-size: 12px;
      color: #777;
      max-width: 140px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Toggle switch */
    .toggle {
      appearance: none;
      -webkit-appearance: none;
      width: 40px;
      height: 22px;
      background: #ccc;
      border-radius: 11px;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }
    .toggle:checked { background: #4a9d6f; }
    .toggle::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
    }
    .toggle:checked::after { left: 20px; }
    .divider {
      border: none;
      border-top: 1px solid #e0ddd8;
      margin: 12px 0;
    }
    #site-section {
      transition: opacity 0.15s;
    }
    .site-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
  </style>
</head>
<body>
  <h1>calm-web</h1>
  <p class="subtitle">Low-stimulation browsing</p>

  <div class="row">
    <span class="label">Enabled</span>
    <input type="checkbox" class="toggle" id="global-toggle" />
  </div>

  <hr class="divider" />

  <div id="site-section">
    <div class="row">
      <div class="site-meta">
        <span class="label">On this site</span>
        <span class="site-hostname" id="site-hostname"></span>
      </div>
      <input type="checkbox" class="toggle" id="site-toggle" />
    </div>
  </div>

  <script type="module" src="popup.ts"></script>
</body>
</html>
